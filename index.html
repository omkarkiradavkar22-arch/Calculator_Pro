<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF -8">
    <title>Omkar Kirdavkar | Calculator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <div class="calculator">
        <div class="top">
            <h2>calculator</h2>
            <button class="mode" onclick="toggleMode()">color mode</button>
        </div>
        <input type="text" id="display" disabled>
       
<div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="append('%')">%</button>
    <button onclick="backspace()">⌫</button>
    <button onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('0')" class="zero">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal">=</button>
</div>
        <div class="history">
            <button onclick="clearHistory()" class="clear-history">Clear History</button>

            <ul id="historyList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
